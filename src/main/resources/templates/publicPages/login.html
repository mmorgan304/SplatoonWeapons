<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <title>Please Log In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light vh-100 d-flex align-items-center justify-content-center">

<div class="card shadow-sm" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4">

        <h2 class="text-center card-title mb-4 fw-bold">Please Log In</h2>

        <div th:if="${param.error}" class="alert alert-danger py-2 text-center mb-3" role="alert">
            Invalid username or password.
        </div>

        <div th:if="${param.logout}" class="alert alert-success py-2 text-center mb-3" role="alert">
            You have been logged out.
        </div>

        <form th:action="@{/login}" method="post">

            <div class="mb-3">
                <label for="username" class="form-label small fw-bold text-muted">Username</label>
                <input type="text"
                       id="username"
                       name="username"
                       class="form-control form-control-lg"
                       placeholder="Enter your username"
                       required
                       autofocus/>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-bold text-muted">Password</label>
                <input type="password"
                       id="password"
                       name="password"
                       class="form-control form-control-lg"
                       placeholder="Enter your password"
                       required/>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg splat-button">Log In</button>
            </div>
        </form>

    </div>
</div>

</body>
</html>
