<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Splatoon Weapons - Weapon List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .header {
            position: sticky;
            top: 0;
        }
    </style>
</head>
<body>
<div class="container-fluid mt-4">
    <h1 class="mb-4">Weapon List</h1>
    <p><a class="btn btn-sm btn-outline-primary" href="addweapon">Add Another</a></p>
    <table class="table table-striped table-sm">
        <thead>
        <tr>
            <th class="header">id</th>
            <th class="header">Weapon</th>
            <th class="header">Internal Name</th>
            <th class="header">Sub Weapon</th>
            <th class="header">Special Weapon</th>
            <th class="header">Weapon Class</th>
            <th class="header">Weight Class</th>
            <th class="header">MM Range</th>
            <th class="header">Actual Range</th>
            <th class="header">Points for Special</th>
            <th class="header">Firing Profiles</th>
            <th class="header">Avg Paint / Match</th>
            <th class="header">Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${weaponList.isEmpty()}">
            <td colspan="14">No Weapons Found</td>
        </tr>
        <tr th:each="weapon : ${weaponList}">
            <td><span th:text="${weapon.id}"></span></td>
            <td><span th:text="${weapon.weaponName}"></span></td>
            <td><span th:text="${weapon.secretName}"></span></td>
            <td><span th:text="${weapon.subweapon.subweaponName}"></span></td>
            <td><span th:text="${weapon.specialWeapon.specialWeaponName}"></span></td>
            <td><span th:text="${weapon.weaponType.weaponTypeName}"></span></td>
            <td><span th:text="${weapon.weight.weightName}"></span></td>
            <td><span th:text="${weapon.matchmakingRange}"></span></td>
            <td><span th:text="${weapon.rangeActual}"></span></td>
            <td><span th:text="${weapon.specialPoints}"></span></td>

            <td>
                <div th:each="profile : ${weapon.firingModes}" class="mb-2 small" style="line-height: 1.3;">
                    <span class="badge bg-secondary text-light th-mode-name"
                          th:text="${profile.firingModeName}">Primary</span>
                    <div class="ps-1 text-muted">
                        <span>Dmg: <span th:text="${profile.maxDamage}">0</span></span>
                        </span>
                    </div>
                </div>
            </td>

            <td><span th:text="${weapon.avgPaintPerMatch}"></span></td>
            <td>
                <a th:href="@{/admin/modifyweapon/{id}(id=${weapon.id})}"
                   class="btn btn-sm btn-outline-primary">
                    Edit
                </a>
            </td>
        </tr>
        </tbody>
    </table>
    <a class="btn btn-sm btn-outline-primary" href="addweapon">Add Another</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
