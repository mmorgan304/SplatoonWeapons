<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Splatoon Weapons - Add/Modify Weapon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">Add/Modify Weapon</h1>
    <form action="#" th:action="@{/admin/processweapon}" th:object="${newWeapon}" method="post">
        <input type="hidden" th:field="*{id}"/>

        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label for="weaponName" class="form-label fw-bold">Weapon Name</label>
                <input type="text" th:field="*{weaponName}" autofocus="autofocus" class="form-control" id="weaponName"
                       placeholder="e.g., Splattershot"/>
            </div>
            <div class="col-md-6">
                <label for="secretName" class="form-label fw-bold">Internal / Secret Name</label>
                <input type="text" th:field="*{secretName}" class="form-control" id="secretName"
                       placeholder=""/>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label for="weaponType" class="form-label fw-bold">Weapon Class</label>
                <select th:field="*{weaponType.id}" class="form-select" id="weaponType">
                    <option th:each="option : ${weaponTypeList}"
                            th:value="${option.id}"
                            th:text="${option.weaponTypeName}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label for="weight" class="form-label fw-bold">Weight Class</label>
                <select th:field="*{weight.id}" class="form-select" id="weight">
                    <option th:each="option : ${weightList}"
                            th:value="${option.id}"
                            th:text="${option.weightName}"></option>
                </select>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <label for="subweapon" class="form-label fw-bold">Sub Weapon</label>
                <select th:field="*{subweapon.id}" class="form-select" id="subweapon">
                    <option th:each="option : ${subweaponsList}"
                            th:value="${option.id}"
                            th:text="${option.subweaponName}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="specialWeapon" class="form-label fw-bold">Special Weapon</label>
                <select th:field="*{specialWeapon.id}" class="form-select" id="specialWeapon">
                    <option th:each="option : ${specialWeaponsList}"
                            th:value="${option.id}"
                            th:text="${option.specialWeaponName}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="specialPoints" class="form-label fw-bold">Points for Special</label>
                <input type="number" th:field="*{specialPoints}" class="form-control" id="specialPoints"
                       placeholder="e.g., 190"/>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-6">
                <label for="matchmakingRange" class="form-label fw-bold">Matchmaking Range</label>
                <input type="text" th:field="*{matchmakingRange}" class="form-control" id="matchmakingRange"
                       placeholder="Internal matchmaking bracket score"/>
            </div>
            <div class="col-md-6">
                <label for="rangeActual" class="form-label fw-bold">In-Game Range</label>
                <input type="text" th:field="*{rangeActual}" class="form-control" id="rangeActual"
                       placeholder="Displayed 'Range' metric"/>
            </div>
        </div>

        <div class="border rounded p-4 bg-light mb-4">

            <div style="display: none;">
                <select id="firingModeOptionsTemplate">
                    <option value="">-- Select Mode --</option>
                    <option th:each="option : ${firingModeList}"
                            th:value="${option.firingModeName}"
                            th:text="${option.firingModeName}"></option>
                </select>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0 text-dark fw-bold">Firing Profiles</h4>
                <button type="button" class="btn btn-sm btn-success" id="addProfileBtn">
                    + Add Firing Profile
                </button>
            </div>

            <div id="firingProfilesContainer">
                <div th:each="profile, stat : *{firingModes}"
                     class="card profile-card mb-3 border-secondary-subtle shadow-sm">
                    <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center py-2">
                        <span class="fw-bold profile-title" th:text="'Profile #' + (${stat.count})">Profile #1</span>
                        <button type="button" class="btn btn-sm btn-danger btn-remove-profile">Remove</button>
                    </div>
                    <div class="card-body row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Mode Name / Type</label>
                            <select class="form-select form-select-sm"
                                    th:field="*{firingModes[__${stat.index}__].firingModeName}" required>
                                <option value="">-- Select Mode --</option>
                                <option th:each="option : ${firingModeList}"
                                        th:value="${option.firingModeName}"
                                        th:text="${option.firingModeName}"></option>
                            </select>
                        </div>
                        <div class="col-md-1">
                            <label class="form-label small fw-bold">Max Damage</label>
                            <input type="text" class="form-control form-control-sm"
                                   th:field="*{firingModes[__${stat.index}__].maxDamage}"/>
                        </div>
                        <div class="col-md-1">
                            <label class="form-label small fw-bold">Min Damage</label>
                            <input type="text" class="form-control form-control-sm"
                                   th:field="*{firingModes[__${stat.index}__].minDamage}"/>
                        </div>
                        <div class="col-md-1">
                            <label class="form-label small fw-bold">Wind Up (Frames)</label>
                            <input type="text" class="form-control form-control-sm"
                                   th:field="*{firingModes[__${stat.index}__].windupFrames}"/>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small fw-bold">Ink Efficiency (%)</label>
                            <input type="number" step="0.01" class="form-control form-control-sm"
                                   th:field="*{firingModes[__${stat.index}__].inkEfficiency}"/>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small fw-bold">Action Interval (Frames)</label>
                            <input type="text" class="form-control form-control-sm"
                                   th:field="*{firingModes[__${stat.index}__].actionIntervalFrames}"/>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small fw-bold">Effective Range</label>
                            <input type="number" step="0.01" class="form-control form-control-sm"
                                   th:field="*{firingModes[__${stat.index}__].effectiveRange}"/>
                        </div>
                        <div class="form-check form-switch bg-light p-3 rounded border mt-4">
                            <input type="checkbox" th:field="*{firingModes[__${stat.index}__].hasOneshot}"
                                   class="form-check-input ms-0 me-2"
                                   th:id="${'hasOneshot_' + stat.index}"/>
                            <label class="form-check-label fw-bold" th:for="${'hasOneshot_' + stat.index}">Can one-shot
                                opponents</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4 align-items-center">
            <div class="col-md-6">
                <label for="avgPaintPerMatch" class="form-label fw-bold">Avg Paint Per Match</label>
                <input type="number" th:field="*{avgPaintPerMatch}" class="form-control" id="avgPaintPerMatch"
                       placeholder="e.g., 950"/>
            </div>
        </div>

        <div class="d-grid gap-2 d-md-block text-end mt-4">
            <input class="btn btn-primary btn-lg splat-button px-5" type="submit" value="Add/Modify Weapon">
        </div>

    </form>
</div>

<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function () {
        const container = document.getElementById("firingProfilesContainer");
        const addBtn = document.getElementById("addProfileBtn");
        const templateSelect = document.getElementById("firingModeOptionsTemplate");

        let profileIndex = container.querySelectorAll(".profile-card").length;

        if (profileIndex === 0) {
            addProfileRow();
        }

        addBtn.addEventListener("click", function () {
            addProfileRow();
        });

        container.addEventListener("click", function (e) {
            if (e.target && e.target.classList.contains("btn-remove-profile")) {
                const card = e.target.closest(".profile-card");
                card.remove();
                reindexProfiles();
            }
        });

        function addProfileRow() {
            const card = document.createElement("div");
            card.className = "card profile-card mb-3 border-secondary-subtle shadow-sm";

            const dropdownOptionsHtml = templateSelect ? templateSelect.innerHTML : '<option value="">-- Select Mode --</option>';

            card.innerHTML = `
                <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center py-2">
                    <span class="fw-bold profile-title">Profile #${profileIndex + 1}</span>
                    <button type="button" class="btn btn-sm btn-danger btn-remove-profile">Remove</button>
                </div>
                <div class="card-body row g-3">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Mode Name / Type</label>
                        <select class="form-select form-select-sm" name="firingModes[${profileIndex}].firingModeName" required>
                            ${dropdownOptionsHtml}
                        </select>
                    </div>
                    <div class="col-md-1">
                        <label class="form-label small fw-bold">Max Damage</label>
                        <input type="text" class="form-control form-control-sm" name="firingModes[${profileIndex}].maxDamage" />
                    </div>
                    <div class="col-md-1">
                        <label class="form-label small fw-bold">Min Damage</label>
                        <input type="text" class="form-control form-control-sm" name="firingModes[${profileIndex}].minDamage"/>
                    </div>
                    <div class="col-md-1">
                        <label class="form-label small fw-bold">Wind Up</label>
                        <input type="text" class="form-control form-control-sm" name="firingModes[${profileIndex}].windupFrames"/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-bold">Ink Efficiency (%)</label>
                        <input type="number" step="0.01" class="form-control form-control-sm" name="firingModes[${profileIndex}].inkEfficiency"/>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-bold">Action Interval</label>
                        <input type="text" class="form-control form-control-sm" name="firingModes[${profileIndex}].actionIntervalFrames" value="" />
                    </div>
                    <div class="col-md-2">
                        <label class="form-label small fw-bold">Effective Range</label>
                        <input type="number" step="0.01" class="form-control form-control-sm" name="firingModes[${profileIndex}].effectiveRange"/>
                    </div>
                    <div class="form-check form-switch bg-light p-3 rounded border mt-4">
                        <input type="checkbox" class="form-check-input ms-0 me-2" id="hasOneshot_${profileIndex}" name="firingModes[${profileIndex}].hasOneshot" value="true" />
                        <input type="hidden" name="_firingModes[${profileIndex}].hasOneshot" value="on" />
                        <label class="form-check-label fw-bold" for="hasOneshot_${profileIndex}">Can one-shot opponents</label>
                     </div>
                </div>
            `;

            container.appendChild(card);
            profileIndex++;
        }

        function reindexProfiles() {
            const cards = container.querySelectorAll(".profile-card");
            profileIndex = 0;

            cards.forEach((card, idx) => {
                card.querySelector(".profile-title").textContent = `Profile #${idx + 1}`;

                // 🎯 FIXED: Re-indexes IDs and For tags alongside element names to maintain label linking integrity
                const checkbox = card.querySelector("input[type='checkbox']");
                const label = card.querySelector(".form-check-label");
                if (checkbox && label) {
                    checkbox.setAttribute("id", `hasOneshot_${idx}`);
                    label.setAttribute("for", `hasOneshot_${idx}`);
                }

                card.querySelectorAll("input, select").forEach(element => {
                    const currentName = element.getAttribute("name");
                    if (currentName) {
                        const updatedName = currentName.replace(/\[\d+\]/, `[${idx}]`);
                        element.setAttribute("name", updatedName);
                    }
                });
                profileIndex++;
            });
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
